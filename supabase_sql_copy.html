<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copy Supabase SQL Setup</title>
  <style>
    :root {
      --nvidia: #76b900;
      --ink: #111827;
      --muted: #5b6575;
      --line: #d7dbe0;
      --soft: #f2f4f7;
      --black: #000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f7f7f7;
      color: var(--ink);
      font-family: "NVIDIA Sans", Aptos, Arial, sans-serif;
      font-size: 15px;
    }
    main {
      width: min(1200px, calc(100vw - 24px));
      margin: 12px auto;
      display: grid;
      gap: 10px;
    }
    h1 {
      margin: 0;
      padding: 12px 14px;
      background: var(--black);
      color: #fff;
      font-size: 21px;
      line-height: 1.2;
    }
    .panel {
      border: 2px solid var(--black);
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 10px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      min-height: 36px;
      border: 1px solid var(--nvidia);
      background: var(--nvidia);
      color: #fff;
      cursor: pointer;
      font: inherit;
      padding: 6px 12px;
      font-weight: 700;
    }
    .status {
      color: var(--muted);
      font-weight: 700;
    }
    textarea {
      width: 100%;
      min-height: 70vh;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
      font: 13px/1.35 Menlo, Consolas, monospace;
      padding: 10px;
      resize: vertical;
      white-space: pre;
    }
  </style>
</head>
<body>
  <main>
    <h1>Copy Supabase SQL Setup</h1>
    <section class="panel">
      <div class="actions">
        <button type="button" id="copySql">Copy SQL</button>
        <span class="status" id="status">Loading supabase_gpu_tco_setup.sql...</span>
      </div>
      <textarea id="sqlText" spellcheck="false">Loading supabase_gpu_tco_setup.sql...</textarea>
    </section>
  </main>
  <script>
    const sqlText = document.getElementById("sqlText");
    const status = document.getElementById("status");

    async function loadSql() {
      try {
        const response = await fetch("supabase_gpu_tco_setup.sql?version=invite-only-external", { cache: "no-store" });
        if (!response.ok) throw new Error("SQL file did not load.");
        sqlText.value = await response.text();
        status.textContent = "SQL loaded. Click Copy SQL, then paste into Supabase SQL Editor.";
      } catch (error) {
        status.textContent = error.message;
      }
    }

    document.getElementById("copySql").addEventListener("click", async () => {
      sqlText.focus();
      sqlText.select();
      try {
        await navigator.clipboard.writeText(sqlText.value);
        status.textContent = "Copied. Go to Supabase SQL Editor, paste, then click Run.";
      } catch (error) {
        document.execCommand("copy");
        status.textContent = "Selected SQL. Press Command + C if it did not copy automatically.";
      }
    });

    loadSql();
  </script>
</body>
</html>
