<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copy Supabase SQL Setup</title>
  <style>
    :root {
      --nvidia: #76b900;
      --ink: #111827;
      --muted: #5b6575;
      --line: #d7dbe0;
      --soft: #f2f4f7;
      --black: #000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f7f7f7;
      color: var(--ink);
      font-family: "NVIDIA Sans", Aptos, Arial, sans-serif;
      font-size: 15px;
    }
    main {
      width: min(1200px, calc(100vw - 24px));
      margin: 12px auto;
      display: grid;
      gap: 10px;
    }
    h1 {
      margin: 0;
      padding: 12px 14px;
      background: var(--black);
      color: #fff;
      font-size: 21px;
      line-height: 1.2;
    }
    .panel {
      border: 2px solid var(--black);
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 10px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      min-height: 36px;
      border: 1px solid var(--nvidia);
      background: var(--nvidia);
      color: #fff;
      cursor: pointer;
      font: inherit;
      padding: 6px 12px;
      font-weight: 700;
    }
    .status {
      color: var(--muted);
      font-weight: 700;
    }
    textarea {
      width: 100%;
      min-height: 70vh;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
      font: 13px/1.35 Menlo, Consolas, monospace;
      padding: 10px;
      resize: vertical;
      white-space: pre;
    }
  </style>
</head>
<body>
  <main>
    <h1>Copy Supabase SQL Setup</h1>
    <section class="panel">
      <div class="actions">
        <button type="button" id="copySql">Copy SQL</button>
        <span class="status" id="status">Click Copy SQL, then paste into Supabase SQL Editor.</span>
      </div>
      <textarea id="sqlText" spellcheck="false">-- GPU TCO secure login and named configuration storage.
-- Run this in your Supabase SQL editor, then update gpu_tco_auth_config.js
-- with the project URL and public anon key.

create extension if not exists pgcrypto;

create table if not exists public.profiles (
  id uuid primary key references auth.users(id) on delete cascade,
  email text not null unique,
  role text not null default 'user' check (role in ('user', 'admin')),
  created_at timestamptz not null default now(),
  updated_at timestamptz not null default now()
);

create table if not exists public.tco_configurations (
  id uuid primary key default gen_random_uuid(),
  owner_id uuid not null references auth.users(id) on delete cascade,
  app_id text not null,
  name text not null,
  state jsonb not null,
  created_at timestamptz not null default now(),
  updated_at timestamptz not null default now(),
  check (length(trim(name)) between 1 and 120)
);

create unique index if not exists tco_configurations_owner_app_name_uidx
  on public.tco_configurations (owner_id, app_id, lower(name));

create or replace function public.touch_updated_at()
returns trigger
language plpgsql
as $$
begin
  new.updated_at = now();
  return new;
end;
$$;

drop trigger if exists profiles_touch_updated_at on public.profiles;
create trigger profiles_touch_updated_at
before update on public.profiles
for each row execute function public.touch_updated_at();

drop trigger if exists tco_configurations_touch_updated_at on public.tco_configurations;
create trigger tco_configurations_touch_updated_at
before update on public.tco_configurations
for each row execute function public.touch_updated_at();

create or replace function public.is_gpu_tco_admin()
returns boolean
language sql
stable
security definer
set search_path = public
as $$
  select exists (
    select 1
    from public.profiles
    where id = auth.uid()
      and role = 'admin'
  );
$$;

create or replace function public.handle_gpu_tco_user_profile()
returns trigger
language plpgsql
security definer
set search_path = public
as $$
declare
  normalized_email text := lower(coalesce(new.email, ''));
begin
  if normalized_email = '' or right(normalized_email, 11) <> '@nvidia.com' then
    raise exception 'GPU TCO access requires an @nvidia.com email address';
  end if;

  insert into public.profiles (id, email, role)
  values (
    new.id,
    normalized_email,
    case
      -- Add more administrator aliases here as needed.
      when normalized_email in ('deanh@nvidia.com') then 'admin'
      else 'user'
    end
  )
  on conflict (id) do update
    set email = excluded.email,
        role = case
          when public.profiles.role = 'admin' then 'admin'
          when excluded.email in ('deanh@nvidia.com') then 'admin'
          else public.profiles.role
        end,
        updated_at = now();

  return new;
end;
$$;

drop trigger if exists on_auth_user_gpu_tco_profile on auth.users;
create trigger on_auth_user_gpu_tco_profile
after insert or update of email on auth.users
for each row execute function public.handle_gpu_tco_user_profile();

alter table public.profiles enable row level security;
alter table public.tco_configurations enable row level security;

drop policy if exists profiles_select_self_or_admin on public.profiles;
create policy profiles_select_self_or_admin
on public.profiles
for select
using (auth.uid() = id or public.is_gpu_tco_admin());

drop policy if exists profiles_update_admin on public.profiles;
create policy profiles_update_admin
on public.profiles
for update
using (public.is_gpu_tco_admin())
with check (public.is_gpu_tco_admin());

drop policy if exists tco_configurations_select_owner_or_admin on public.tco_configurations;
create policy tco_configurations_select_owner_or_admin
on public.tco_configurations
for select
using (auth.uid() = owner_id or public.is_gpu_tco_admin());

drop policy if exists tco_configurations_insert_owner on public.tco_configurations;
create policy tco_configurations_insert_owner
on public.tco_configurations
for insert
with check (auth.uid() = owner_id);

drop policy if exists tco_configurations_update_owner_or_admin on public.tco_configurations;
create policy tco_configurations_update_owner_or_admin
on public.tco_configurations
for update
using (auth.uid() = owner_id or public.is_gpu_tco_admin())
with check (auth.uid() = owner_id or public.is_gpu_tco_admin());

drop policy if exists tco_configurations_delete_owner_or_admin on public.tco_configurations;
create policy tco_configurations_delete_owner_or_admin
on public.tco_configurations
for delete
using (auth.uid() = owner_id or public.is_gpu_tco_admin());</textarea>
    </section>
  </main>
  <script>
    const sqlText = document.getElementById("sqlText");
    const status = document.getElementById("status");
    document.getElementById("copySql").addEventListener("click", async () => {
      sqlText.focus();
      sqlText.select();
      try {
        await navigator.clipboard.writeText(sqlText.value);
        status.textContent = "Copied. Go to Supabase SQL Editor, paste, then click Run.";
      } catch (error) {
        document.execCommand("copy");
        status.textContent = "Selected SQL. Press Command + C if it did not copy automatically.";
      }
    });
  </script>
</body>
</html>
